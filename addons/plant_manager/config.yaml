name: Plant Manager
version: "0.1.0"
slug: plant_manager
description: Centralized plant moisture tracking, watering history, and digest notifications.
url: https://www.home-assistant.io/
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:sprout
panel_title: Plant Manager
homeassistant_api: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  default_notify_service: ""
  digest_schedule_times:
    - "07:00"
  poll_interval: 60
  timezone: ""
schema:
  default_notify_service: str?
  digest_schedule_times:
    - str
  poll_interval: int(15,3600)
  timezone: str?
